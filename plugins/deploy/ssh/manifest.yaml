name: ssh
kind: deploy
display_name: "SSH (direct)"
version: "0.1.0"
author: thumper-core
description: >-
  Drops the honeytoken onto hosts you can reach directly over SSH - good for
  servers and bastions. Uses your local ssh client and its key/agent auth.
config_schema:
  - key: hosts
    label: "Target hosts"
    type: string
    required: true
    placeholder: "host1.example.com,host2.example.com"
    help: "Comma-separated."
  - key: user
    label: "SSH user"
    type: string
    required: true
    placeholder: "ubuntu"
  - key: ssh_options
    label: "Extra ssh options"
    type: string
    required: false
    placeholder: "-i ~/.ssh/deploy_key -p 22"
